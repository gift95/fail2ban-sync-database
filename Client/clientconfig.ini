[DEFAULT]
# 全局同步配置
sync_remote_banned_ips = true
# 是否将本地封禁的IP同步到服务器
sync_local_banned_ips = true
# 是否同步允许的IP规则
sync_allowed_ips = true
# 是否移除不在服务器列表中的IP（慎用）
sync_remove_unlisted_ips = false


[server]
host = f2b.yxliuchn.uk
port = 443
protocol = https

[logging]
log_file = client.log
max_bytes = 1048576
backup_count = 3

[fail2ban]
# 要同步的jail列表，多个jail用逗号分隔
jails = sshd,invalid-user
# 单个jail配置（如果只需要同步一个jail）
#jail = sshd

[auth]
token = token_1234567890abcdef1234567890abcdef

