[DEFAULT]
# 初始封禁时间（支持时间单位：s=秒, m=分钟, h=小时, d=天, w=周）
bantime = 10m
# 是否启用递增封禁时间
bantime.increment = true
# 递增因子
bantime.factor = 3
# 最大封禁时间
bantime.maxtime = 5w
# IP保留在known状态的时间
known_duration = 48h
# IP保留在allowed状态的时间
allowed_duration = 2m
# Web界面用户名
web_user = admin
# Web界面密码
web_pass = admin123
# 数据库连接配置
# 数据库文件路径
db_path = ip_management.db
# 数据库最大连接数
db_max_connections = 10
# 日志配置
log_file = server.log
log_level = INFO

[api_tokens]
# 客户端令牌配置，使用openssl rand -hex 32生成
# 格式: 客户端名称 = 令牌值
client1 = 生成令牌_1
client2 = 生成令牌_2
# 真实客户端配置，添加实际使用的令牌
client_main = 37e9c8d646100e1aad918afadde00f409779031b2d03a8fa239649597aa56c2d
